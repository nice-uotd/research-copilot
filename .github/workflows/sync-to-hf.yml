name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: nice-uotd
          HF_SPACE_NAME: research-copilot
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret 未配置"
            exit 1
          fi
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" \
            HEAD:main
          echo "✅ Synced to HF: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
